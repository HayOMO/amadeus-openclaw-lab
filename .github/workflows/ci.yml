name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Windows test suite
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install root dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Install plugin dependencies
        shell: pwsh
        run: .\scripts\INSTALL_IMAGEBOT_PLUGIN_DEPS.ps1 -Force

      - name: Plugin dependency audit
        run: npm run audit:plugins

      - name: Prepare patched OpenClaw runtime
        shell: pwsh
        run: |
          $runtimeLocalAppData = Join-Path $env:RUNNER_TEMP "LocalAppData"
          "LOCALAPPDATA=$runtimeLocalAppData" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $env:LOCALAPPDATA = $runtimeLocalAppData
          npm run prepare:runtime:ci

      - name: Lint generated config
        run: npm run lint:config

      - name: Feature health
        run: npm run health:features

      - name: Full test suite
        run: npm run test:all

      - name: Runtime patch verification
        run: npm run test:patches

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@6261f5cd38e133cdcf00c23e3943f3e9d012d538
        with:
          path: ./
          extra_args: --results=verified
